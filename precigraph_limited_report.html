<style>
 :root {

  --red: #b83020; --red-pale: #fdf2f0;
  --emerald: #1a6a40; --emerald-pale: #edf8f2;

 }
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: 'IBM Plex Sans', sans-serif; background: var(--offwhite); color: var(--text); line-height: 1.65; font-size: 15px; }

 .content-wrap { max-width: 1100px; margin: 0 auto; padding: 46px 64px 80px; }

 .subsection-title { font-family: 'Libre Baskerville', serif; font-size: 18px; color: var(--iron); margin: 34px 0 13px; padding-bottom: 9px; border-bottom: 1px solid var(--border); }
 .alert { border-radius: 8px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid; font-size: 13.5px; line-height: 1.65; }
 .alert-critical { background: var(--red-pale); border-color: var(--red); }
 .alert-warning { background: var(--amber-pale); border-color: var(--amber); }
 .alert-ok { background: var(--emerald-pale); border-color: var(--emerald); }
 .alert-info { background: var(--steel-ultra); border-color: var(--steel); }
 .alert-title { font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; font-family: 'IBM Plex Mono', monospace; }
 .alert-critical .alert-title { color: var(--red); }
 .alert-warning .alert-title { color: var(--amber); }
 .alert-ok .alert-title { color: var(--emerald); }
 .alert-info .alert-title { color: var(--steel); }
 .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 13px; margin: 18px 0; }
 .profile-grid.two-col { grid-template-columns: 1fr 1fr; }
 .profile-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; box-shadow: var(--shadow); }
 .profile-card h4 { font-size: 10.5px; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; color: var(--steel); font-weight: 600; margin-bottom: 8px; }
 .profile-card p { font-size: 13px; color: var(--text-mid); line-height: 1.62; }
 .profile-card strong { color: var(--iron); }
 .stat-value { font-size: 18px; font-weight: 600; color: #fff; line-height: 1.1; }
 .stat-value.steel { color: #60b8f0; } .stat-value.red { color: #f09070; } .stat-value.emerald { color: #80e0a8; } .stat-value.amber { color: #f5c47a; }
 .styled-list { list-style: none; padding: 0; margin: 8px 0; }
 .styled-list li { padding: 6px 0 6px 22px; position: relative; font-size: 13.5px; color: var(--text-mid); border-bottom: 1px solid #edf2f7; line-height: 1.58; }
 .styled-list li:last-child { border-bottom: none; }
 .styled-list li::before { content: '→'; position: absolute; left: 0; color: var(--steel); font-weight: 700; }
 .b { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 3px; font-size: 10.5px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
 .b-red { background: #fdecea; color: var(--red); border: 1px solid #f5c4c1; }
 .b-amber { background: var(--amber-pale); color: #9a5000; border: 1px solid #f5daa0; }
 .b-green { background: var(--emerald-pale); color: var(--emerald); border: 1px solid #a8dfc0; }
 .eos-bar-wrap { margin: 16px 0; }
 .eos-score-big { font-size: 56px; font-weight: 700; color: var(--iron); font-family: 'Libre Baskerville', serif; line-height: 1; }
 .report-footer { background: var(--iron); color: rgba(255,255,255,0.28); padding: 20px 64px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; line-height: 1.7; }
 @media (max-width: 900px) { .report-header, .content-wrap, .report-footer { padding-left: 20px; padding-right: 20px; } .header-stats, .profile-grid { grid-template-columns: 1fr; } h1 { font-size: 26px; } }
</style>
